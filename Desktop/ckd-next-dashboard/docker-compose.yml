version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: ckd-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: ckd-kafka
    depends_on:
      - zookeeper
    ports:
      - "9095:9092"
      - "29095:29092"
    environment:
      KAFKA_BROKER_ID: 10
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://ckd-kafka:29092,PLAINTEXT_HOST://localhost:9095
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_NUM_PARTITIONS: 3
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ckd-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: ckd-next
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    restart: unless-stopped

  # Redis는 이미 외부에서 실행 중 (localhost:6379)
  # 필요 시 아래 주석 해제하여 별도 포트로 기동
  # redis:
  #   image: redis:7.2-alpine
  #   container_name: ckd-redis
  #   ports:
  #     - "6380:6379"
  #   command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
  #   restart: unless-stopped

  # ── 관측성 스택 ────────────────────────────────────────
  # Prometheus(9090) / Grafana(3000) 는 kaist-l5-infra 프로젝트의
  # 기존 컨테이너를 공용으로 사용합니다.
  # CKD-NEXT 스크레이프 잡은 해당 prometheus.yml에 추가되었습니다.
